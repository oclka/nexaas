version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: app-redis
    ports:
      - '6379:6379'
    networks:
      - app-network
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: app-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '5455:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    networks:
      - app-network
    restart: unless-stopped

  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: app-glitchtip
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/glitchtip
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-1234567890
      - ALLOWED_HOSTS=*
      - GLITCHTIP_DOMAIN=http://localhost:9000
      - PORT=8000
      - EMAIL_URL=consolemail://
      - GLITCHTIP_MAX_EVENT_LIFE_DAYS=7
    ports:
      - '9000:8000'
    networks:
      - app-network
    restart: unless-stopped
    command: sh -c "./manage.py migrate && ./bin/run-celery-with-beat.sh & ./bin/run-uwsgi.sh"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: app-jaeger
    ports:
      - '16686:16686'
      - '4317:4317'
      - '4318:4318'
    networks:
      - app-network

  loki:
    image: grafana/loki:latest
    container_name: app-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - '3100:3100'
    networks:
      - app-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: app-grafana
    ports:
      - '3101:3000'
    networks:
      - app-network
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: app-mailpit
    ports:
      - '2525:1025'
      - '8025:8025'
    restart: unless-stopped

networks:
  app-network:
    name: app-network
    driver: bridge

volumes:
  postgres-data:
    name: app-postgres-data
    driver: local
